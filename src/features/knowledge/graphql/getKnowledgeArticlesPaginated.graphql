query GetKnowledgeArticlesPaginated($first: Int!, $after: String) {
  knowledgeArticles(first: $first, after: $after) {
    nodes {
      id
      databaseId
      title
      date
      slug
      excerpt

      featuredImage {
        node {
          sourceUrl
          altText
        }
      }

      knowledgeArticleFields {
        readingTime

        author {
          nodes {
            ... on Author {
              title

              authorFields {
                role

                avatar {
                  node {
                    sourceUrl
                    altText
                  }
                }
              }
            }
          }
        }
      }

      knowledgeCategories {
        nodes {
          name
          slug
        }
      }

      views

      likes
      dislikes
    }

    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
